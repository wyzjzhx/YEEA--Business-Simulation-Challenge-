<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>企业经营模拟系统【修复稳定版】</title>
<style>
*{box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;margin:0;padding:0;}
body{max-width:1150px;margin:25px auto;padding:0 20px;line-height:1.6;}
.wrap-box{border:1px solid #d0d7e3;border-radius:8px;padding:18px;margin-bottom:16px;background:#fdfdfd;}
h3{margin-bottom:12px;color:#222;border-left:4px solid #2774d9;padding-left:8px;}
input,button{padding:8px 10px;margin:6px 4px;outline:none;border:1px solid #ccc;border-radius:4px;}
input[type=number]{width:140px;}
.btn-blue{background:#2578dd;color:#fff;border:1px solid #2578dd;cursor:pointer;}
.btn-red{background:#e63b3b;color:#fff;border:1px solid #e63b3b;cursor:pointer;}
.btn-gray{background:#999;color:#fff;border:1px solid #999;cursor:not-allowed;}
.hide{display:none;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ddd;padding:9px;text-align:center;}
th{background:#f2f7ff;}
.tip{color:#666;font-size:14px;margin:6px 0;}
</style>
</head>
<body>
<h2 style="text-align:center;margin-bottom:20px;">企业经营多队共用模拟平台</h2>

<!--管理员区-->
<div class="wrap-box">
    <h3>管理员后台管理</h3>
    <input id="adminPwd" placeholder="输入管理员密码" type="password">
    <button class="btn-blue" onclick="adminLogin()">登录管理后台</button>
    <div id="adminPanel" class="hide">
        <p class="tip">当前全局轮次：<span id="roundText">1</span> / 最大轮次：<span id="maxRoundText">6</span></p>
        <button class="btn-blue" onclick="nextRound()">开启下一轮经营</button>
        <button class="btn-red" onclick="resetAll()">一键清空全部比赛数据</button>
    </div>
</div>

<!--选手操作区-->
<div class="wrap-box">
    <h3>队伍注册+本轮经营决策</h3>
    <input id="teamInput" placeholder="填写队伍/公司名称">
    <button class="btn-blue" onclick="registerTeam()">注册新队伍</button>

    <div id="operWrap" class="hide">
        <p class="tip">您已注册成功，当前第 <span id="nowR">1</span> 轮决策</p>
        <p>项目投入：
            投资：<input type="number" min="0" id="inp1" value="0">
            生产：<input type="number" min="0" id="inp2" value="0">
            营销：<input type="number" min="0" id="inp3" value="0">
        </p>
        <button id="subBtn" class="btn-blue" onclick="submitDecision()">提交本轮决策</button>
    </div>
</div>

<!--排行榜-->
<div class="wrap-box">
    <h3>全队伍资产排行榜（自动同步）</h3>
    <table>
        <thead>
            <tr>
                <th>队伍名称</th>
                <th>剩余现金</th>
                <th>累计总资产</th>
                <th>已完成轮次</th>
            </tr>
        </thead>
        <tbody id="rankBody"></tbody>
    </table>
</div>

<script>
//全局配置（可自行修改参数）
const SETTING = {
    adminPwd:"yeea26",
    startMoney:400,
    maxRound:6,
    storeKey:"bizSimData"
};

//读取本地存储，无数据自动初始化
let gameData = JSON.parse(localStorage.getItem(SETTING.storeKey) || JSON.stringify({
    round:1,
    teamList:[]
}));

//保存数据+刷新页面
function saveAndRefresh(){
    localStorage.setItem(SETTING.storeKey,JSON.stringify(gameData));
    refreshPage();
}

//页面渲染刷新
function refreshPage(){
    document.getElementById('roundText').innerText = gameData.round;
    document.getElementById('maxRoundText').innerText = SETTING.maxRound;
    document.getElementById('nowR').innerText = gameData.round;

    //渲染排行榜
    let rankDom = document.getElementById('rankBody');
    rankDom.innerHTML = "";
    //资产降序排序
    let sortArr = [...gameData.teamList].sort((a,b)=>b.totalAsset - a.totalAsset);
    sortArr.forEach(item=>{
        let tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${item.name}</td>
            <td>${item.cash}</td>
            <td>${item.totalAsset}</td>
            <td>${item.finishRound}/${SETTING.maxRound}</td>
        `;
        rankDom.appendChild(tr);
    })
}

//跨标签同步：其他页面修改数据自动刷新本页面
window.addEventListener('storage',e=>{
    if(e.key === SETTING.storeKey){
        gameData = JSON.parse(e.newValue);
        refreshPage();
    }
})

//管理员登录
function adminLogin(){
    let pwd = document.getElementById('adminPwd').value.trim();
    if(pwd === SETTING.adminPwd){
        document.getElementById('adminPanel').classList.remove('hide');
        alert("管理员登录成功！");
    }else{
        alert("密码错误！");
    }
}

//队伍注册
function registerTeam(){
    let name = document.getElementById('teamInput').value.trim();
    if(!name){
        alert("请输入队伍名称！");
        return;
    }
    //判断队伍是否已存在
    let exist = gameData.teamList.find(item=>item.name === name);
    if(exist){
        alert("该队伍名称已注册，请勿重复注册！");
        return;
    }
    //新增队伍
    gameData.teamList.push({
        name:name,
        cash:SETTING.startMoney,
        totalAsset:SETTING.startMoney,
        finishRound:0
    })
    saveAndRefresh();
    document.getElementById('operWrap').classList.remove('hide');
    alert(`${name}注册完成！`);
}

//提交决策（修复重复提交、资金超限BUG）
function submitDecision(){
    let teamName = document.getElementById('teamInput').value.trim();
    let teamInfo = gameData.teamList.find(i=>i.name === teamName);
    if(!teamInfo){
        alert("请先注册队伍！");
        return;
    }
    //判断本轮是否已经提交
    if(teamInfo.finishRound >= gameData.round){
        alert("本轮已提交决策，不可重复提交！等待管理员开启下一轮");
        return;
    }

    let inv = Number(document.getElementById('inp1').value||0);
    let pro = Number(document.getElementById('inp2').value||0);
    let mar = Number(document.getElementById('inp3').value||0);
    let totalCost = inv + pro + mar;

    //投入不能大于现有现金
    if(totalCost > teamInfo.cash){
        alert(`投入总额${totalCost}超过现有现金${teamInfo.cash}，无法提交！`);
        return;
    }

    //收益公式（浮动随机）
    let profit = Math.floor((inv*0.3+pro*0.4+mar*0.2)*(1+Math.random()*0.22));
    //资金变动
    teamInfo.cash = teamInfo.cash - totalCost + profit;
    teamInfo.totalAsset += profit;
    teamInfo.finishRound = gameData.round;

    //提交后按钮置灰禁止重复点击
    let subBtn = document.getElementById('subBtn');
    subBtn.innerText = "已提交";
    subBtn.className = "btn-gray";
    subBtn.disabled = true;

    saveAndRefresh();
    alert(`提交成功！本轮盈利：${profit}，剩余现金：${teamInfo.cash}`);
}

//管理员切换轮次
function nextRound(){
    if(gameData.round >= SETTING.maxRound){
        alert("已达到最大轮次，比赛结束！");
        return;
    }
    gameData.round++;
    saveAndRefresh();
    alert(`成功开启第${gameData.round}轮！所有队伍可开始新一轮决策`);
}

//清空全部数据
function resetAll(){
    if(!confirm("确认清空所有队伍数据，数据无法恢复！")) return;
    gameData = {round:1,teamList:[]};
    saveAndRefresh();
    document.getElementById('operWrap').classList.add('hide');
    document.getElementById('subBtn').innerText = "提交本轮决策";
    document.getElementById('subBtn').className = "btn-blue";
    document.getElementById('subBtn').disabled = false;
    alert("全部数据重置完毕！");
}

//页面初始化渲染
refreshPage();
</script>
</body>
</html>
