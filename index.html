const START_CAPITAL = 400;

const LOAN_RATE = 0.05;

const CITIES = {
    "上海": { costIndex: 1.0, loanLimitMult: 1.2, marketBase: 1200, prodCostBase: 28 },

};
const EVENTS = [

    { name: "🎁 节日全民促销季", effectDesc: "需求暴涨，但营销投入成本抬升", salesMod: 1.25, qualityMod: 1.0, costMod: 1.09 }
];

function generateRandomEvent(round) {
    const idx = Math.floor(Math.random() * EVENTS.length);
    return { ...EVENTS[idx], round };
}

class AIOpponent {
    constructor(name, city, strategyType) {
        this.name = name;
        this.city = city;
        this.strategy = strategyType;
        this.history = [];
        this.netWorth = START_CAPITAL;
        this.loan = 0;
        this.round = 0;
        this.lastProfit = 0;
    }
    makeDecision(round, globalEvent){
        let cash = this.netWorth;
        let maxLoan = CITIES[this.city].loanLimitMult *300 - this.loan;
        let loanTake =0;
        if(cash<80 && maxLoan>0) loanTake = Math.min(120,maxLoan);
        else if(cash<200 && this.strategy==='aggressive') loanTake = Math.min(80,maxLoan);
        let quantity,qualityInvest,price,agents,marketing;
        if(this.strategy==='aggressive'){
            quantity = 280+Math.floor(Math.random()*120);
            qualityInvest = Math.min(150,40+8*round);
            agents = Math.min(12,6+Math.floor(Math.random()*5));
            marketing = Math.min(180,45+round*4);
        }else if(this.strategy==='balanced'){
            quantity = 200+Math.floor(Math.random()*100);
            qualityInvest = Math.min(150,30+5*round);
            agents = Math.min(12,3+Math.floor(Math.random()*5));
            marketing = Math.min(180,30+round*3);
        }else{
            quantity = 140+Math.floor(Math.random()*80);
            qualityInvest = Math.min(150,20+3*round);
            agents = Math.min(12,1+Math.floor(Math.random()*3));
            marketing = Math.min(180,18+round*2);
        }
        quantity = Math.max(80,Math.min(650,quantity));
        const baseCostPerUnit = CITIES[this.city].prodCostBase * globalEvent.costMod * CITIES[this.city].costIndex;
        let suggestPrice = baseCostPerUnit*1.85 + (qualityInvest/Math.max(1,quantity))*2.2;
        if(this.strategy==='aggressive') suggestPrice *=0.92;
        if(this.strategy==='conservative') suggestPrice *=1.08;
        price = Math.max(35,Math.min(140,Math.round(suggestPrice)));
        return {loan:loanTake,quantity,qualityInvest,price,agents,marketing};
    }
    calcRoundProfit(dec,event,allCompetitorAttr,totalMarketPotential){
        let newLoan = dec.loan;
        let cityCfg = CITIES[this.city];
        let loanCap = cityCfg.loanLimitMult*300;
        if(this.loan+newLoan>loanCap) newLoan = loanCap - this.loan;
        this.loan += newLoan;
        let interest = this.loan * LOAN_RATE;
        let unitProdCost = cityCfg.prodCostBase * event.costMod * cityCfg.costIndex;
        let prodCost = dec.quantity * unitProdCost;
        let costTotal = prodCost + dec.qualityInvest + dec.marketing + interest;
        let PQI = dec.quantity>0 ? dec.qualityInvest/dec.quantity :0;
        let SPI = dec.marketing*(1+0.1*dec.agents);
        function attr(pr,pq,sp){
            let ps = Math.max(0,Math.min(1,(180-pr)/150));
            let qs = Math.min(1,pq/3.0);
            let ms = Math.min(1,sp/200);
            return ps*0.7 + qs*0.15 + ms*0.15;
        }
        let myAttr = attr(dec.price,PQI,SPI);
        let sumAttr = allCompetitorAttr.reduce((s,v)=>s+v,0)+myAttr;
        let share = sumAttr>0 ? myAttr/sumAttr : 1/(allCompetitorAttr.length+1);
        let sales = Math.floor(totalMarketPotential*share);
        sales = Math.min(sales,dec.quantity);
        let revenue = sales*dec.price;
        let profit = revenue - costTotal;
        this.netWorth += profit;
        this.lastProfit = profit;
        this.history.push({round:this.round+1,netWorth:this.netWorth});
        this.round++;
        return profit;
    }
}

class PlayerSession {
    constructor(id, companyName, city) {
        this.id = id;
        this.companyName = companyName;
        this.city = city;
        this.netWorth = START_CAPITAL;
        this.loan = 0;
        this.round = 0;
        this.gameOver = false;
        this.isBankrupt = false;
        this.historyNetWorth = [START_CAPITAL];
        this.decisionsLog = [];
        this.currentEvent = null;
        this.lastProfit = 0;
    }
    playRound(decision, roundNumber, allAIs){
        if(this.gameOver || this.round>=MAX_ROUNDS || this.isBankrupt) return {success:false};
        const event = generateRandomEvent(roundNumber);
        this.currentEvent = event;
        const cityCfg = CITIES[this.city];
        let addLoan = Math.min(decision.loan||0, cityCfg.loanLimitMult*300 - this.loan);
        this.loan += addLoan;
        let interest = this.loan * LOAN_RATE;
        let {quantity,qualityInvest,price,agents,marketing} = decision;
        quantity = Math.max(30,Math.min(800,quantity));
        qualityInvest = Math.max(0,Math.min(200,qualityInvest));
        price = Math.max(30,Math.min(180,price));
        agents = Math.min(12,Math.max(0,agents));
        marketing = Math.max(5,Math.min(250,marketing));
        let unitCost = cityCfg.prodCostBase * event.costMod * cityCfg.costIndex;
        let totalCost = quantity*unitCost + qualityInvest + marketing + interest;
        function calcAttr(p, q, s){
            let ps = Math.max(0,Math.min(1,(180-p)/150));
            let qs = Math.min(1,q/3);
            let ss = Math.min(1,s/200);
            return ps*0.7+qs*0.15+ss*0.15;
        }
        let pqi = quantity?qualityInvest/quantity:0;
        let spi = marketing*(1+agents*0.1);
        let myAttr = calcAttr(price,pqi,spi);
        let aiDecs = allAIs.map(a=>a.makeDecision(roundNumber,event));
        let aiAttrs = aiDecs.map(d=>calcAttr(d.price,d.quantity?d.qualityInvest/d.quantity:0,d.marketing*(1+d.agents*0.1)));
        let totalAttr = myAttr + aiAttrs.reduce((a,b)=>a+b,0);
        let market = cityCfg.marketBase * event.salesMod * (0.85+Math.random()*0.3);
        let sales = Math.floor(market * (myAttr/totalAttr));
        sales = Math.min(sales,quantity);
        let profit = sales*price - totalCost;
        this.netWorth += profit;
        this.lastProfit = profit;
        if(this.netWorth <= BANKRUPT_LIMIT){this.isBankrupt=true;this.gameOver=true;}
        this.historyNetWorth.push(this.netWorth);
        this.decisionsLog.push({round:roundNumber,profit,netWorth:this.netWorth});
        this.round++;
        if(this.round>=MAX_ROUNDS) this.gameOver=true;
        allAIs.forEach((ai,i)=>ai.calcRoundProfit(aiDecs[i],event,aiAttrs.filter((_,j)=>j!==i),market));
        return {success:true};
    }
    getStatus(){return {company:this.companyName,city:this.city,netWorth:this.netWorth,round:this.round,gameOver:this.gameOver,bankrupt:this.isBankrupt,lastProfit:this.lastProfit};}
}

let playersMap = new Map();
let aiOpponentsMap = new Map();
let nextPlayerId = 1;
const LOCAL_MY_PLAYER_ID = "MY_CURR_PLAYER_ID";
const HAS_JOINED_FLAG = "DEVICE_JOINED";

const GameData = AV.Object.extend('GameData');

async function saveToCloud() {
    const data = {
        nextId: nextPlayerId,
        players: Array.from(playersMap.values()),
        aiMap: Object.fromEntries(aiOpponentsMap)
    };
    const query = new AV.Query(GameData);
    let obj = await query.first();
    if (!obj) obj = new GameData();
    obj.set('content', JSON.stringify(data));
    await obj.save();
}

async function loadFromCloud() {
    try {
        const query = new AV.Query(GameData);
        const obj = await query.first();
        if (!obj) return false;
        const d = JSON.parse(obj.get('content'));
        nextPlayerId = d.nextId || 1;
        playersMap.clear();
        (d.players || []).forEach(p => {
            const pl = new PlayerSession(p.id, p.companyName, p.city);
            Object.assign(pl, p);
            playersMap.set(p.id, pl);
        });
        aiOpponentsMap.clear();
        Object.entries(d.aiMap || {}).forEach(([k, v]) => {
            aiOpponentsMap.set(Number(k), v.map(a => Object.assign(new AIOpponent(), a)));
        });
        return true;
    } catch (e) { return false; }
}

function createAIsForPlayer(){
    return [new AIOpponent("竞速集团","上海","aggressive"),new AIOpponent("平衡实业","广州","balanced"),new AIOpponent("稳健联合","成都","conservative")];
}

async function createNewPlayer(company,city){
    if(localStorage.getItem(HAS_JOINED_FLAG)){alert("本设备已报名！");return null;}
    company=company.trim();
    if(playersMap.size>=MAX_PLAYER){alert("满员30队！");return null;}
    if(Array.from(playersMap.values()).some(p=>p.companyName===company)){alert("队名重复！");return null;}
    let id=nextPlayerId++;
    let p=new PlayerSession(id,company,city);
    playersMap.set(id,p);
    aiOpponentsMap.set(id,createAIsForPlayer());
    localStorage.setItem(LOCAL_MY_PLAYER_ID,id);
    localStorage.setItem(HAS_JOINED_FLAG,"1");
    await saveToCloud();
    renderAllPlayers();
    alert("报名成功！");
    return p;
}

function renderGlobalRanking(){
    let list=Array.from(playersMap.values()).sort((a,b)=>b.netWorth-a.netWorth);
    let b=document.getElementById("rankingBody");
    b.innerHTML="";
    let s=document.getElementById("editPlayerSel");
    s.innerHTML="";
    list.forEach((p,i)=>{
        let r=b.insertRow();
        r.insertCell(0).innerText=i+1;
        r.insertCell(1).innerText=p.companyName;
        r.insertCell(2).innerText=p.city;
        r.insertCell(3).innerHTML=`<strong class="${p.netWorth>=START_CAPITAL?'badge-profit':'badge-loss'}">${p.netWorth.toFixed(1)}万</strong>`;
        r.insertCell(4).innerText=`${p.round}/${MAX_ROUNDS}`;
        r.insertCell(5).innerHTML=p.isBankrupt?'<span class="bankrupt-tag">破产</span>':p.gameOver?'🏁完成':'比赛中';
        let o=document.createElement("option");
        o.value=p.id;o.innerText=p.companyName;s.appendChild(o);
    });
    document.getElementById("joinGameBtn").disabled=playersMap.size>=MAX_PLAYER||!!localStorage.getItem(HAS_JOINED_FLAG);
}

window.__chartCache={};
function drawNetWorthChart(pid){
    let p=playersMap.get(pid);if(!p)return;
    let c=`chart-${pid}`;
    let d=document.querySelector(`.player-card[data-id="${pid}"]`);if(!d)return;
    let w=d.querySelector(`#${c}-wrap`)||document.createElement("div");
    w.id=`${c}-wrap`;w.style.padding="12px 20px";w.innerHTML=`<canvas id="${c}" width="380" height="150"></canvas>`;
    d.appendChild(w);
    if(window.__chartCache[c])window.__chartCache[c].destroy();
    window.__chartCache[c]=new Chart(document.getElementById(c),{
        type:"line",
        data:{labels:p.historyNetWorth.map((_,i)=>`R${i}`),datasets:[{label:"净资产(万)",data:p.historyNetWorth,borderColor:"#3b82f6",tension:0.2,fill:false}]},
        options:{responsive:true}
    });
}

function renderAllPlayers(){
    let cont=document.getElementById("playersContainer");
    cont.innerHTML="";
    let myId=+localStorage.getItem(LOCAL_MY_PLAYER_ID);
    for(let [pid,p] of playersMap){
        let card=document.createElement("div");
        card.className="player-card "+(pid===myId?"my-card-mark":"other-card-disable");
        card.dataset.id=pid;
        let evt=p.currentEvent?`<div class="event-msg">本轮：${p.currentEvent.name}（${p.currentEvent.effectDesc}）</div>`:"";
        let dis=pid!==myId||p.gameOver||p.isBankrupt?"disabled":"";
        let tip=p.isBankrupt?"<div style='color:red;padding:0 20px'>⚠️已破产</div>":"";
        let log=p.decisionsLog.slice(-2).map(l=>`R${l.round}:${l.profit>0?"+":""}${l.profit.toFixed(0)}`).join("|")||"未开始";
        card.innerHTML=`
            <div class="card-header">
                <span class="company-name">🏢${p.companyName}</span>
                <span class="city-badge">${p.city}</span>
                <span class="networth">${p.netWorth.toFixed(1)}万</span>
            </div>
            <div class="stats-grid">
                <span>轮次 ${p.round}/${MAX_ROUNDS}</span>
                <span>上轮利润：${p.lastProfit.toFixed(1)}万</span>
            </div>
            ${evt}${tip}
            <div class="decision-form">
                <div class="form-row"><label>产量</label><input ${dis} type="number" value="220" min="30" max="800"></div>
                <div class="form-row"><label>质量</label><input ${dis} type="number" value="28" min="0" max="200"></div>
                <div class="form-row"><label>定价</label><input ${dis} type="number" value="68" min="30" max="180"></div>
                <div class="form-row"><label>代理</label><input ${dis} type="number" value="3" min="0" max="12"></div>
                <div class="form-row"><label>营销</label><input ${dis} type="number" value="38" min="5" max="250"></div>
                <div class="form-row"><label>贷款</label><input ${dis} type="number" value="0" min="0" max="300"></div>
                <button ${dis}>提交第${p.round+1}轮</button>
            </div>
            <div class="history-log">${log}</div>
        `;
        cont.appendChild(card);
        let inputs=card.querySelectorAll("input");
        let btn=card.querySelector("button");
        if(pid===myId&&!p.gameOver&&!p.isBankrupt){
            btn.onclick=async ()=>{
                if(!confirm("确认提交？"))return;
                let d={quantity:+inputs[0].value,qualityInvest:+inputs[1].value,price:+inputs[2].value,agents:+inputs[3].value,marketing:+inputs[4].value,loan:+inputs[5].value};
                let r=p.playRound(d,p.round+1,aiOpponentsMap.get(pid));
                if(r.success){await saveToCloud();renderAllPlayers();drawNetWorthChart(pid);}
            };
        }
        drawNetWorthChart(pid);
    }
    renderGlobalRanking();
}

function exportCSV(){
    let list=Array.from(playersMap.values()).sort((a,b)=>b.netWorth-a.netWorth);
    let t="排名,公司,城市,净资产,轮次,状态\n";
    list.forEach((p,i)=>t+=`${i+1},${p.companyName},${p.city},${p.netWorth.toFixed(2)},${p.round}/${MAX_ROUNDS},${p.isBankrupt?"破产":p.gameOver?"完赛":"进行中"}\n`);
    let blob=new Blob([t],{type:"text/csv;charset=utf-8"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="成绩.csv";
    a.click();
}

function bindAdminEvent(){
    document.getElementById("unlockAdminBtn").onclick=()=>{
        if(document.getElementById("adminPwdInput").value===ADMIN_PWD){
            document.querySelector(".admin-panel").classList.add("show");
            alert("管理员已解锁");
        }else alert("密码错误");
    };
    document.getElementById("joinGameBtn").onclick=()=>{
        let n=document.getElementById("joinCompany").value.trim();
        let c=document.getElementById("joinCity").value;
        if(!n){alert("请填队名");return;}
        createNewPlayer(n,c);
        document.getElementById("joinCompany").value="";
    };
    document.getElementById("nextAllRound").onclick=async ()=>{
        await saveToCloud();renderAllPlayers();
    };
    document.getElementById("resetAllGame").onclick=async ()=>{
        if(!confirm("清空所有数据？"))return;
        const query=new AV.Query(GameData);
        const obj=await query.first();
        if(obj) await obj.destroy();
        playersMap.clear();aiOpponentsMap.clear();nextPlayerId=1;
        localStorage.clear();
        renderAllPlayers();
    };
    document.getElementById("exportCsv").onclick=exportCSV;
    document.getElementById("saveEditVal").onclick=async ()=>{
        let id=+document.getElementById("editPlayerSel").value;
        let v=+document.getElementById("editNetVal").value;
        if(isNaN(v))return;
        let p=playersMap.get(id);if(!p)return;
        p.netWorth=v;
        await saveToCloud();
        renderAllPlayers();
        alert("已修改");
    };
}

(async ()=>{
    await loadFromCloud();
    bindAdminEvent();
    renderAllPlayers();
})();
</script>
</body>
</html>
